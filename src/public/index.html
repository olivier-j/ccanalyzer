<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ccanalyzer</title>
  <script>
    (function () {
      var saved = localStorage.getItem('cca-theme');
      var theme = saved || ((window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="stylesheet" href="style.css?v=25" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
</head>
<body>
  <div id="app">
    <nav id="sidebar">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">ccanalyzer</span>
      </div>
      <div id="nav-menu">
        <a href="#" class="nav-item active" data-view="dashboard">
          <span class="nav-icon">⬡</span> Dashboard
        </a>
        <a href="#" class="nav-item" data-view="tools">
          <span class="nav-icon">⚙</span> Tool usage
        </a>
      </div>
      <div id="sidebar-bottom">
        <div id="breadcrumb"></div>
        <div id="theme-toggle">
          <span class="theme-icon">☀</span>
          <button id="theme-switch" class="theme-switch" type="button" role="switch" aria-checked="false" aria-label="Toggle light/dark theme">
            <span class="theme-switch-knob"></span>
          </button>
          <span class="theme-icon">☾</span>
        </div>
      </div>
    </nav>

    <main id="content">
      <div id="view-dashboard" class="view"></div>
      <div id="view-tools" class="view hidden"></div>
      <div id="view-sessions" class="view hidden"></div>
      <div id="view-session-detail" class="view hidden"></div>
    </main>
  </div>

  <div id="loading" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>

  <script src="app.js?v=25"></script>
</body>
</html>
